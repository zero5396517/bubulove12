name: Bug 报告
description: 报告一个 Bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量填写完整信息，帮助我们更快定位问题。

  - type: dropdown
    id: platform
    attributes:
      label: 运行平台
      options:
        - Android（Dev Build）
        - Android（Expo Go）
        - iOS（Dev Build）
        - iOS（Expo Go）
        - Web
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 问题分类
      options:
        - 视频播放
        - 直播
        - 弹幕
        - 登录 / 账号
        - 下载
        - UI / 界面
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      placeholder: 请描述你遇到的问题...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 App
        2. 点击 ...
        3. 发现 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: 你期望发生什么？

  - type: textarea
    id: logs
    attributes:
      label: 错误日志 / 截图
      description: 如有控制台报错或截图，请粘贴在此
      render: shell
