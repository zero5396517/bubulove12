<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>恋爱日记 - 编辑里程碑</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="screen" role="application" aria-label="恋爱日记 - 编辑里程碑">
        <div class="header">
          <a class="icon-button" href="milestones-detail.html" aria-label="返回详情">
            <span class="material-icons">arrow_back</span>
          </a>
          <div class="header-title">编辑里程碑</div>
          <div class="header-action">
            <a class="icon-button" href="milestones-detail.html" aria-label="预览">
              <span class="material-icons">visibility</span>
            </a>
          </div>
        </div>

        <div class="full-content safe-pad-bottom">
          <div class="card">
            <div style="font-weight: 950; font-size: 15px; margin-bottom: 6px">
              调整这个对你们很重要的日子
            </div>
            <div class="muted" style="font-size: 13px; margin-bottom: var(--space-md)">
              编辑界面与新增保持一致，便于快速完成修改。
            </div>

            <div class="form-group" style="margin-top: 0">
              <label class="form-label" for="msNameEdit">名称</label>
              <input
                id="msNameEdit"
                type="text"
                value="第一次牵手纪念日"
                aria-label="里程碑名称"
              />
            </div>

            <div class="form-group">
              <label class="form-label">日期类型</label>
              <div class="chips-row" aria-label="日期类型选择">
                <a class="chip active" href="milestones-edit.html" aria-label="公历">
                  公历
                </a>
                <a class="chip" href="milestones-edit.html#lunar" aria-label="农历">
                  农历
                </a>
              </div>
              <div style="margin-top: var(--space-sm)">
                <label class="form-label" for="msDateEdit" style="margin-bottom: var(--space-sm)">日期</label>
                <input
                  id="msDateEdit"
                  type="date"
                  aria-label="里程碑日期"
                  value="2026-04-05"
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="msDescEdit">说明</label>
              <textarea
                id="msDescEdit"
                aria-label="里程碑说明"
              >那天的风有点冷，但你握住我手的瞬间，我就知道这份喜欢会一直延续下去。</textarea>
            </div>

            <div class="form-group">
              <label class="form-label">媒体（可更换）</label>
              <div
                style="
                  background:
                    linear-gradient(135deg, rgba(255, 79, 166, 0.18), rgba(61, 231, 255, 0.10)),
                    rgba(255, 255, 255, 0.03);
                  border: 1px solid rgba(255, 255, 255, 0.10);
                  border-radius: var(--radius-md);
                  height: 150px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                "
                aria-label="媒体预览（示例）"
              >
                <img
                  src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=900&q=70"
                  alt="媒体预览"
                  style="width:100%;height:100%;object-fit:cover; border-radius: var(--radius-md)"
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">是否重要时刻</label>
              <div class="chips-row" aria-label="重要时刻开关（UI态）">
                <a class="chip active" href="milestones-edit.html" aria-label="重要">
                  重要时刻
                </a>
                <a class="chip" href="milestones-edit.html#notImportant" aria-label="普通">
                  普通
                </a>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="msRemindDaysEdit">提前 N 天提醒</label>
              <input
                id="msRemindDaysEdit"
                type="number"
                min="0"
                max="365"
                placeholder="例如：3"
                aria-label="提前提醒天数"
                value="3"
              />
              <div class="muted" style="font-size: 12px; margin-top: 8px">
                重要时刻会在首页提醒栏优先展示。
              </div>
            </div>

            <div class="form-group" style="margin-top: var(--space-lg)">
              <a
                class="button primary full"
                href="milestones-detail.html"
                aria-label="保存编辑"
              >
                <span class="button-icon material-icons">check_circle</span>
                保存并返回详情
              </a>
              <div style="height: 10px"></div>
              <a
                class="button outline full"
                href="milestones-detail.html"
                aria-label="取消编辑"
              >
                取消
              </a>
            </div>
          </div>

          <div style="height: 40px"></div>
        </div>

        <div class="nav-bar" role="navigation" aria-label="底部导航">
          <a class="nav-item" href="home.html" aria-label="首页">
            <span class="material-icons nav-icon">home</span>
            <span>首页</span>
          </a>
          <a class="nav-item" href="diaries-list.html" aria-label="恋爱日记">
            <span class="material-icons nav-icon">edit_note</span>
            <span>日记</span>
          </a>
          <a class="nav-item" href="albums-list.html" aria-label="爱的相册">
            <span class="material-icons nav-icon">photo_album</span>
            <span>相册</span>
          </a>
          <a
            class="nav-item active"
            href="milestones-timeline.html"
            aria-label="相爱里程碑"
          >
            <span class="material-icons nav-icon">timeline</span>
            <span>里程碑</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
