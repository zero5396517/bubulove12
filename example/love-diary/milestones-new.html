<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>恋爱日记 - 新建里程碑</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="screen" role="application" aria-label="恋爱日记 - 新建里程碑">
        <div class="header">
          <a class="icon-button" href="milestones-timeline.html" aria-label="返回时间线">
            <span class="material-icons">arrow_back</span>
          </a>
          <div class="header-title">添加里程碑</div>
          <div class="header-action">
            <a class="icon-button" href="milestones-timeline.html" aria-label="返回">
              <span class="material-icons">timeline</span>
            </a>
          </div>
        </div>

        <div class="full-content safe-pad-bottom">
          <div class="card">
            <div style="font-weight: 950; font-size: 15px; margin-bottom: 6px">
              记录一个对你们很重要的日子
            </div>
            <div class="muted" style="font-size: 13px; margin-bottom: var(--space-md)">
              支持公历/农历选择、设置重要时刻与提前提醒（UI/UX 设计稿）。
            </div>

            <div class="form-group" style="margin-top: 0">
              <label class="form-label" for="msName">名称</label>
              <input id="msName" type="text" placeholder="比如：第一次牵手" aria-label="里程碑名称" />
            </div>

            <div class="form-group">
              <label class="form-label">日期类型</label>
              <div class="chips-row" aria-label="日期类型选择">
                <a class="chip active" href="milestones-new.html" aria-label="公历">
                  公历
                </a>
                <a class="chip" href="milestones-new.html#lunar" aria-label="农历">
                  农历
                </a>
              </div>
              <div style="margin-top: var(--space-sm)">
                <label class="form-label" for="msDate" style="margin-bottom: var(--space-sm)">日期（示例）</label>
                <input id="msDate" type="date" aria-label="里程碑日期" value="2026-04-05" />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="msDesc">说明</label>
              <textarea
                id="msDesc"
                placeholder="可以写一句你们的故事：为什么这天特别？"
                aria-label="里程碑说明"
              ></textarea>
            </div>

            <div class="form-group">
              <label class="form-label">媒体（可选占位）</label>
              <div
                style="
                  background: rgba(255, 255, 255, 0.03);
                  border: 1px dashed rgba(255, 255, 255, 0.16);
                  border-radius: var(--radius-md);
                  height: 150px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                "
                aria-label="媒体占位（示例）"
              >
                <div style="text-align: center">
                  <span class="material-icons" style="font-size: 38px; color: var(--text-tertiary)">add_photo_alternate</span>
                  <div class="muted" style="font-size: 13px; margin-top: 6px">
                    上传照片 / 图片封面（UI态）
                  </div>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">是否重要时刻</label>
              <div class="chips-row" aria-label="重要时刻开关（UI态）">
                <a class="chip active" href="milestones-new.html" aria-label="重要">
                  重要时刻
                </a>
                <a class="chip" href="milestones-new.html#notImportant" aria-label="普通">
                  普通
                </a>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="msRemindDays">提前 N 天提醒</label>
              <input
                id="msRemindDays"
                type="number"
                min="0"
                max="365"
                placeholder="例如：3"
                aria-label="提前提醒天数"
                value="3"
              />
              <div class="muted" style="font-size: 12px; margin-top: 8px">
                提示：此处展示“提前N天提醒”的界面状态，实际提醒可在本地或服务端实现。
              </div>
            </div>

            <div class="form-group" style="margin-top: var(--space-lg)">
              <a
                class="button primary full"
                href="milestones-detail.html"
                aria-label="保存里程碑"
              >
                <span class="button-icon material-icons">check_circle</span>
                保存并查看倒计时
              </a>
              <div style="height: 10px"></div>
              <a
                class="button outline full"
                href="milestones-timeline.html"
                aria-label="取消添加"
              >
                取消
              </a>
            </div>
          </div>

          <div style="height: 40px"></div>
        </div>

        <div class="nav-bar" role="navigation" aria-label="底部导航">
          <a class="nav-item" href="home.html" aria-label="首页">
            <span class="material-icons nav-icon">home</span>
            <span>首页</span>
          </a>
          <a class="nav-item" href="diaries-list.html" aria-label="恋爱日记">
            <span class="material-icons nav-icon">edit_note</span>
            <span>日记</span>
          </a>
          <a class="nav-item" href="albums-list.html" aria-label="爱的相册">
            <span class="material-icons nav-icon">photo_album</span>
            <span>相册</span>
          </a>
          <a
            class="nav-item active"
            href="milestones-timeline.html"
            aria-label="相爱里程碑"
          >
            <span class="material-icons nav-icon">timeline</span>
            <span>里程碑</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
