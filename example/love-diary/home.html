<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>恋爱日记 - 首页</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="screen" role="application" aria-label="恋爱日记 - 首页">
        <div class="header">
          <div class="header-title">恋爱日记</div>
          <div class="header-action">
            <a class="icon-button" href="confession.html" aria-label="去爱的告白">
              <span class="material-icons">favorite</span>
            </a>
            <a
              class="icon-button"
              href="milestones-timeline.html"
              aria-label="查看里程碑"
            >
              <span class="material-icons">timeline</span>
            </a>
          </div>
        </div>

        <div class="content safe-pad-bottom">
          <div class="hero">
            <div style="font-size: 22px; line-height: 1.1; margin-bottom: 10px">
              <span class="gradient-text">布布与一二</span> 的甜蜜时刻
            </div>
            <div style="color: var(--text-secondary); font-size: 13px">
              Mobile First · 本地存储 · 随时记录
            </div>
          </div>

          <div class="form-group" style="margin-top: var(--space-md)">
            <div class="row-between">
              <div style="font-weight: 800">重要时刻提醒</div>
              <a
                href="milestones-timeline.html"
                style="
                  color: var(--primary);
                  text-decoration: none;
                  font-weight: 700;
                  font-size: 13px;
                "
              >
                查看全部 >
              </a>
            </div>

            <div class="card" style="margin-top: var(--space-md)">
              <div class="row-between">
                <div>
                  <div style="font-weight: 800; margin-bottom: 6px">
                    纪念日：第一次牵手
                  </div>
                  <div class="muted" style="font-size: 13px">
                    还有 <span style="color: var(--neon-yellow); font-weight: 900">5</span
                    > 天 · 重要时刻
                  </div>
                </div>
                <div class="badge important">重要</div>
              </div>

              <div class="hr"></div>

              <div class="row-between">
                <div>
                  <div style="font-weight: 800; margin-bottom: 6px">
                    今天：写下你的日记
                  </div>
                  <div class="muted" style="font-size: 13px">
                    建议记录心情与照片，让回忆更鲜活
                  </div>
                </div>
                <div
                  style="
                    width: 44px;
                    height: 44px;
                    border-radius: var(--radius-full);
                    background: rgba(255, 79, 166, 0.16);
                    border: 1px solid rgba(255, 79, 166, 0.40);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                  "
                  aria-label="未读"
                  title="未读"
                >
                  <span class="material-icons" style="color: var(--primary)"
                    >notifications</span
                  >
                </div>
              </div>
            </div>
          </div>

          <div class="form-group" style="margin-top: var(--space-lg)">
            <div style="font-weight: 800; margin-bottom: var(--space-sm)">
              快速入口
            </div>

            <div class="grid-4">
              <a class="entry" href="diaries-list.html" aria-label="去恋爱日记">
                <div class="entry-icon">
                  <span class="material-icons">edit_note</span>
                </div>
                <div class="entry-title">恋爱日记</div>
                <div class="entry-sub">写、找、回看</div>
              </a>

              <a class="entry" href="albums-list.html" aria-label="去爱的相册">
                <div class="entry-icon" style="background: rgba(61, 231, 255, 0.14); border-color: rgba(61, 231, 255, 0.25)">
                  <span class="material-icons" style="color: var(--neon-blue)">photo_album</span>
                </div>
                <div class="entry-title">爱的相册</div>
                <div class="entry-sub">多图整理与封面</div>
              </a>

              <a class="entry" href="milestones-timeline.html" aria-label="去相爱里程碑">
                <div class="entry-icon" style="background: rgba(45, 255, 179, 0.12); border-color: rgba(45, 255, 179, 0.22)">
                  <span class="material-icons" style="color: var(--neon-green)">timeline</span>
                </div>
                <div class="entry-title">相爱里程碑</div>
                <div class="entry-sub">倒计时与重要提醒</div>
              </a>

              <a class="entry" href="confession.html" aria-label="去爱的告白">
                <div class="entry-icon" style="background: rgba(255, 229, 90, 0.10); border-color: rgba(255, 229, 90, 0.22)">
                  <span class="material-icons" style="color: var(--neon-yellow)">favorite</span>
                </div>
                <div class="entry-title">爱的告白</div>
                <div class="entry-sub">写给ta的心动话</div>
              </a>
            </div>
          </div>

          <div style="height: 40px"></div>
        </div>

        <div class="nav-bar" role="navigation" aria-label="底部导航">
          <a class="nav-item active" href="home.html" aria-label="首页">
            <span class="material-icons nav-icon">home</span>
            <span>首页</span>
          </a>
          <a class="nav-item" href="diaries-list.html" aria-label="恋爱日记">
            <span class="material-icons nav-icon">edit_note</span>
            <span>日记</span>
          </a>
          <a class="nav-item" href="albums-list.html" aria-label="爱的相册">
            <span class="material-icons nav-icon">photo_album</span>
            <span>相册</span>
          </a>
          <a class="nav-item" href="milestones-timeline.html" aria-label="相爱里程碑">
            <span class="material-icons nav-icon">timeline</span>
            <span>里程碑</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
